<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- "Is It Boat Day" app icon: a motorboat riding layered waves. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1758b6"/>
      <stop offset="0.55" stop-color="#142f57"/>
      <stop offset="1" stop-color="#061826"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="waveA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#59c1ff"/>
      <stop offset="1" stop-color="#1b85f5"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b85f5"/>
      <stop offset="1" stop-color="#146de1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- sun glow low on the horizon -->
  <circle cx="370" cy="150" r="48" fill="#ffd76e" opacity="0.85"/>

  <!-- motorboat: cabin + hull above the waterline -->
  <path d="M196 214 L300 214 L286 262 L196 262 Z" fill="#bce7ff"/>
  <path d="M120 262 L372 262 L330 322 Q 322 336 304 336 L168 336 Q 150 336 142 322 Z" fill="url(#hull)"/>
  <path d="M120 262 L372 262 L364 280 L132 280 Z" fill="#f59e0b" opacity="0.7"/>

  <!-- waves -->
  <path d="M0 330 Q 64 300 128 330 T 256 330 T 384 330 T 512 330 V 512 H 0 Z" fill="url(#waveA)"/>
  <path d="M0 396 Q 64 366 128 396 T 256 396 T 384 396 T 512 396 V 512 H 0 Z" fill="url(#waveB)" opacity="0.95"/>
  <path d="M0 458 Q 64 430 128 458 T 256 458 T 384 458 T 512 458 V 512 H 0 Z" fill="#142f57" opacity="0.9"/>
</svg>
