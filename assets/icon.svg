<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- "Is It Boat Day" app icon: a white sport boat cutting toward a dawn sun
       through layered swells. Key elements stay inside the inner 80% so the
       same art works as the maskable PWA icon. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1730"/>
      <stop offset="0.58" stop-color="#11305b"/>
      <stop offset="1" stop-color="#1b4a7a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffedb8"/>
      <stop offset="1" stop-color="#f9b234"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3a66"/>
      <stop offset="1" stop-color="#071c33"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- dawn glow: a radial fade so it reads as light, not as a dark halo -->
  <circle cx="330" cy="200" r="130" fill="url(#glow)"/>
  <circle cx="330" cy="200" r="54" fill="url(#sun)"/>

  <!-- sea base under the wave bands -->
  <rect y="300" width="512" height="212" fill="url(#sea)"/>

  <!-- swells, brightest at the surface -->
  <path d="M0 316 Q 64 296 128 316 T 256 316 T 384 316 T 512 316 V 512 H 0 Z" fill="#38bdf8" opacity="0.95"/>
  <path d="M0 372 Q 64 348 128 372 T 256 372 T 384 372 T 512 372 V 512 H 0 Z" fill="#0e7dc2"/>
  <path d="M0 428 Q 64 406 128 428 T 256 428 T 384 428 T 512 428 V 512 H 0 Z" fill="#0a4e86"/>

  <!-- wake trailing the stern -->
  <path d="M84 322 Q 110 316 138 320" stroke="#bae6fd" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M62 344 Q 96 336 132 341" stroke="#7dd3fc" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- the boat: white hull, sheer line sweeping up to the bow (heading right) -->
  <path d="M148 298 Q 260 282 378 264 Q 366 296 352 314 L 170 316 Q 152 312 148 298 Z" fill="#f8fafc"/>
  <!-- hull shadow along the waterline -->
  <path d="M170 316 L 352 314 Q 356 309 360 302 L 176 306 Q 172 311 170 316 Z" fill="#94a3b8" opacity="0.55"/>
  <!-- raked windscreen -->
  <path d="M206 292 L 252 286 L 264 266 L 226 271 Z" fill="#7dd3fc"/>

  <!-- bow spray -->
  <path d="M352 314 Q 388 306 408 318 Q 386 328 358 322 Z" fill="#e0f2fe" opacity="0.9"/>
</svg>
