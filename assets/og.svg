<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Social share card (1200x630): rasterized to public/og.png by scripts/gen-icons.mjs. -->
  <defs>
    <linearGradient id="og-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070f22"/>
      <stop offset="0.6" stop-color="#11305b"/>
      <stop offset="1" stop-color="#1b4a7a"/>
    </linearGradient>
    <linearGradient id="og-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffedb8"/>
      <stop offset="1" stop-color="#f9b234"/>
    </linearGradient>
    <radialGradient id="og-glow">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3a66"/>
      <stop offset="1" stop-color="#06182e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#og-sky)"/>

  <!-- dawn glow + sun, right of center -->
  <circle cx="880" cy="300" r="170" fill="url(#og-glow)"/>
  <circle cx="880" cy="300" r="66" fill="url(#og-sun)"/>

  <!-- sea -->
  <rect y="420" width="1200" height="210" fill="url(#og-sea)"/>
  <path d="M0 438 Q 75 414 150 438 T 300 438 T 450 438 T 600 438 T 750 438 T 900 438 T 1050 438 T 1200 438 V 630 H 0 Z" fill="#38bdf8" opacity="0.9"/>
  <path d="M0 500 Q 75 474 150 500 T 300 500 T 450 500 T 600 500 T 750 500 T 900 500 T 1050 500 T 1200 500 V 630 H 0 Z" fill="#0e7dc2"/>
  <path d="M0 564 Q 75 540 150 564 T 300 564 T 450 564 T 600 564 T 750 564 T 900 564 T 1050 564 T 1200 564 V 630 H 0 Z" fill="#0a4e86"/>

  <!-- the boat, cutting right across the first swell -->
  <g transform="translate(600,86) scale(1.1)">
    <path d="M84 322 Q 110 316 138 320" stroke="#bae6fd" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.55"/>
    <path d="M62 344 Q 96 336 132 341" stroke="#7dd3fc" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.35"/>
    <path d="M148 298 Q 260 282 378 264 Q 366 296 352 314 L 170 316 Q 152 312 148 298 Z" fill="#f8fafc"/>
    <path d="M170 316 L 352 314 Q 356 309 360 302 L 176 306 Q 172 311 170 316 Z" fill="#94a3b8" opacity="0.55"/>
    <path d="M206 292 L 252 286 L 264 266 L 226 271 Z" fill="#7dd3fc"/>
    <path d="M352 314 Q 388 306 408 318 Q 386 328 358 322 Z" fill="#e0f2fe" opacity="0.9"/>
  </g>

  <!-- copy block -->
  <text x="80" y="296" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="#ffffff">Is it <tspan fill="#67e8f9">boat</tspan> day<tspan fill="#fbbf24">?</tspan></text>
  <text x="84" y="368" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="31" font-weight="500" fill="#cbd5e1">Live wind, seas, tides &amp; marine alerts — one honest 0-100 score.</text>
  <text x="84" y="560" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="1" fill="#7dd3fc">isitboatday.com</text>
</svg>
